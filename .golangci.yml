version: "2"

run:
  go: "1.26"
  timeout: 5m

linters:
  enable:
    - gosec
    - staticcheck
    - errcheck
    - bodyclose
    - noctx
    - contextcheck
    - gocritic
    - revive
  settings:
    gosec:
      excludes:
        - G104 # redundant with errcheck
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
  exclusions:
    rules:
      - path: "_test.go"
        linters:
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
